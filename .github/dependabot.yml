version: 2
updates:
  # dashboard (Next.js + React)
  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels: ['dependencies', 'dashboard']
    commit-message:
      prefix: 'chore(deps)'
    # major 업데이트는 별도 라벨 — 사람이 검토 후 머지
    groups:
      dashboard-minor-patch:
        update-types: ['minor', 'patch']
    # next 14 ↔ react 18 peer 호환 — major 업그레이드는 수동만.
    # tailwindcss 4 도 PostCSS 플러그인 변경 등 breaking.
    ignore:
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']

  # telegram-hub (node-telegram-bot-api 등)
  - package-ecosystem: npm
    directory: /services/telegram-hub
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels: ['dependencies', 'telegram-hub']
    commit-message:
      prefix: 'chore(deps)'
    groups:
      hub-minor-patch:
        update-types: ['minor', 'patch']

  # GitHub Actions 자체 (appleboy/ssh-action 등)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels: ['dependencies', 'ci']
    commit-message:
      prefix: 'ci(deps)'
