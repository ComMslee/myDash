name: Deploy Dashboard to Lightsail

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-lightsail
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            cd ~/myDash
            git fetch --all --prune
            git reset --hard origin/master
            # teslamate-auth 가 Caddy 로 전환됨 — 과거 nginx 잔재 정리.
            for stale in nginx-teslamate.htpasswd nginx-teslamate.conf; do
              if [ -e "$stale" ]; then
                echo "[deploy] 과거 nginx 잔재 제거: $stale"
                sudo docker compose stop teslamate-auth 2>/dev/null || true
                sudo rm -rf "$stale"
              fi
            done
            sudo docker compose build dashboard
            sudo docker compose up -d dashboard
            sudo docker compose up -d teslamate-auth
            # telegram-hub: .env에 TELEGRAM_BOT_TOKEN/CHAT_ID 있을 때만 기동
            if grep -q '^TELEGRAM_BOT_TOKEN=' .env 2>/dev/null && grep -q '^TELEGRAM_CHAT_ID=' .env 2>/dev/null; then
              sudo docker compose build telegram-hub
              sudo docker compose up -d telegram-hub
            else
              echo "[deploy] TELEGRAM_BOT_TOKEN/CHAT_ID 미설정 — telegram-hub 스킵"
            fi
            sudo docker image prune -f

            # 캐시 warm-up — 컨테이너 재기동 후 server-cache / dash-agg 모듈 상태 휘발.
            # 핵심 라우트를 한 번씩 호출해서 첫 사용자 진입 시 cold path 제거.
            echo "[deploy] warming caches..."
            SECRET=$(grep "^HUB_SHARED_SECRET=" .env 2>/dev/null | cut -d= -f2)
            # 컨테이너 부팅 대기 (next 첫 요청 30초 이내 응답 보장 못 함)
            for i in 1 2 3 4 5; do
              if curl -sf -o /dev/null --max-time 5 -H "x-hub-secret: $SECRET" http://localhost:5000/api/car; then
                break
              fi
              sleep 6
            done
            for R in /api/car /api/insights /api/drives /api/charge-all-time /api/battery /api/battery-trend /api/monthly-history "/api/summary?range=multi"; do
              T=$(curl -s -o /dev/null -w '%{time_total}s' -H "x-hub-secret: $SECRET" --max-time 30 "http://localhost:5000${R}")
              echo "  ${R}  ${T}"
            done
