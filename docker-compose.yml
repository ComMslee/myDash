services:
  teslamate:
    image: teslamate/teslamate:latest
    restart: always
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_USER=${TM_DB_USER}
      - DATABASE_PASS=${TM_DB_PASS}
      - DATABASE_NAME=${TM_DB_NAME}
      - DATABASE_HOST=database
      - MQTT_HOST=mosquitto
    volumes:
      - ./import:/opt/app/import
    cap_drop:
      - all

  teslamate-auth:
    image: caddy:2-alpine
    restart: always
    ports:
      - 80:80
      - 443:443
      - 4000:4000
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      # Tesla Fleet API public key 정적 서빙 (.well-known 경로). private key 는 마운트 X.
      - /etc/tesla-keys/com.tesla.3p.public-key.pem:/tesla-keys/com.tesla.3p.public-key.pem:ro
    depends_on:
      - teslamate
      - dashboard

  database:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=${TM_DB_USER}
      - POSTGRES_PASSWORD=${TM_DB_PASS}
      - POSTGRES_DB=${TM_DB_NAME}
    volumes:
      - teslamate-db:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    restart: always
    command: mosquitto -c /mosquitto-no-auth.conf
    ports:
      - 1883:1883
    volumes:
      - mosquitto-conf:/mosquitto/config
      - mosquitto-data:/mosquitto/data

  dashboard:
    build: ./dashboard
    restart: always
    environment:
      - TM_DB_USER=${TM_DB_USER}
      - TM_DB_PASS=${TM_DB_PASS}
      - TM_DB_NAME=${TM_DB_NAME}
      - DB_HOST=database
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
      - EV_CHARGER_API_KEY=${EV_CHARGER_API_KEY}
      - TOUR_API_KEY=${TOUR_API_KEY}
      - HOLIDAY_API_KEY=${HOLIDAY_API_KEY:-${TOUR_API_KEY}}
      - KMA_API_KEY=${KMA_API_KEY}
      - HOME_CHARGER_STAT_ID=${HOME_CHARGER_STAT_ID:-PI795111}
      - HOME_CHARGER_STAT_IDS=${HOME_CHARGER_STAT_IDS:-PI795111,PI313299,PIH01089}
      - TELEGRAM_HUB_URL=${TELEGRAM_HUB_URL:-http://telegram-hub:3000}
      - HUB_SHARED_SECRET=${HUB_SHARED_SECRET:-}
      - DASHBOARD_PUBLIC_URL=${DASHBOARD_PUBLIC_URL:-}
      # Tesla Fleet API — 토큰 발급 후에도 ENABLED=false 면 dry_run 유지.
      - TESLA_FLEET_API_ENABLED=${TESLA_FLEET_API_ENABLED:-false}
      - TESLA_FLEET_API_BASE=${TESLA_FLEET_API_BASE:-https://fleet-api.prd.na.vn.cloud.tesla.com}
      - TESLA_FLEET_OAUTH_BASE=${TESLA_FLEET_OAUTH_BASE:-https://auth.tesla.com/oauth2/v3}
      - TESLA_FLEET_AUDIENCE=${TESLA_FLEET_AUDIENCE:-https://fleet-api.prd.na.vn.cloud.tesla.com}
      - TESLA_FLEET_CLIENT_ID=${TESLA_FLEET_CLIENT_ID:-}
      - TESLA_FLEET_CLIENT_SECRET=${TESLA_FLEET_CLIENT_SECRET:-}
      - TESLA_FLEET_REDIRECT_URI=${TESLA_FLEET_REDIRECT_URI:-}
      - TESLA_FLEET_PRIVATE_KEY_PATH=${TESLA_FLEET_PRIVATE_KEY_PATH:-/app/tesla-keys/tesla-private.pem}
      - TESLA_TOKEN_ENC_KEY=${TESLA_TOKEN_ENC_KEY:-}
      - TESLA_VEHICLE_ID=${TESLA_VEHICLE_ID:-}
    volumes:
      - dashboard-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # 컨테이너별 stats 조회용 (api-status 페이지)
      # Tesla Fleet API private key — 명령 서명용. read-only, dashboard 컨테이너만 접근.
      - /etc/tesla-keys/tesla-private.pem:/app/tesla-keys/tesla-private.pem:ro
    # 외부 80/443 은 teslamate-auth (Caddy) 가 담당. 내부 컨테이너 통신은 dashboard:5000.
    # 호스트 127.0.0.1 만 바인딩 — 외부 인터넷 노출 차단 (Caddy 우회 차단).
    # 디버그는 `curl localhost:5000` 으로 SSH 후 호스트 내부에서만 가능.
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      - database

  telegram-hub:
    build: ./services/telegram-hub
    restart: always
    environment:
      - TM_DB_USER=${TM_DB_USER}
      - TM_DB_PASS=${TM_DB_PASS}
      - TM_DB_NAME=${TM_DB_NAME}
      - DB_HOST=database
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - HUB_SHARED_SECRET=${HUB_SHARED_SECRET:-}
      - DASHBOARD_URL=${DASHBOARD_URL:-http://dashboard:5000}
      - DASHBOARD_PUBLIC_URL=${DASHBOARD_PUBLIC_URL:-}
      - DB_POLL_MS=${TG_HUB_DB_POLL_MS:-5000}
    volumes:
      - telegram-hub-data:/data
    depends_on:
      - database

volumes:
  teslamate-db:
  mosquitto-conf:
  mosquitto-data:
  dashboard-data:
  telegram-hub-data:
  caddy-data:
  caddy-config:
