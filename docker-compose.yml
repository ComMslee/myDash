services:
  teslamate:
    image: teslamate/teslamate:latest
    restart: always
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_USER=${TM_DB_USER}
      - DATABASE_PASS=${TM_DB_PASS}
      - DATABASE_NAME=${TM_DB_NAME}
      - DATABASE_HOST=database
      - MQTT_HOST=mosquitto
    volumes:
      - ./import:/opt/app/import
    cap_drop:
      - all

  teslamate-auth:
    image: nginx:alpine
    restart: always
    ports:
      - 4000:80
    volumes:
      - ./nginx-teslamate.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-teslamate.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - teslamate

  database:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=${TM_DB_USER}
      - POSTGRES_PASSWORD=${TM_DB_PASS}
      - POSTGRES_DB=${TM_DB_NAME}
    volumes:
      - teslamate-db:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    restart: always
    command: mosquitto -c /mosquitto-no-auth.conf
    ports:
      - 1883:1883
    volumes:
      - mosquitto-conf:/mosquitto/config
      - mosquitto-data:/mosquitto/data

  dashboard:
    build: ./dashboard
    restart: always
    environment:
      - TM_DB_USER=${TM_DB_USER}
      - TM_DB_PASS=${TM_DB_PASS}
      - TM_DB_NAME=${TM_DB_NAME}
      - DB_HOST=database
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
      - EV_CHARGER_API_KEY=${EV_CHARGER_API_KEY}
      - HOME_CHARGER_STAT_ID=${HOME_CHARGER_STAT_ID:-PI795111}
      - HOME_CHARGER_STAT_IDS=${HOME_CHARGER_STAT_IDS:-PI795111,PI313299,PIH01089}
    ports:
      - 80:5000
      - 5000:5000
    depends_on:
      - database

volumes:
  teslamate-db:
  mosquitto-conf:
  mosquitto-data:
